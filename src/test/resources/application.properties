spring.application.name=compliancePortal-test

# Use H2 in MySQL compatibility mode for fast, hermetic tests.
spring.datasource.url=jdbc:h2:mem:compliance_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Production uses Flyway against MySQL; in unit/integration tests we let Hibernate create
# the schema from the JPA entity model so we are not coupling the test suite to MySQL-only
# DDL features (e.g. TIMESTAMP(3) DEFAULT CURRENT_TIMESTAMP(3), CHECK constraints, ...).
# The Flyway migration is exercised by the production profile and Testcontainers integration
# tests (see DESIGN.md "future work").
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

app.security.jwt.secret=test_secret_key_for_compliance_portal_unit_and_integration_tests_only_xxxxxxxx
app.security.jwt.expiration-minutes=60
app.security.jwt.issuer=bnr-compliance-portal-test

app.documents.storage-root=./var/test-documents
app.documents.max-bytes=5242880

app.seed.enabled=false
app.seed.default-password=Password123!
