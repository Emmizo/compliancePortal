spring.application.name=compliancePortal

server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/compliance_portal?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:compliance_user}
spring.datasource.password=${DB_PASSWORD:compliance_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Application-specific configuration
app.security.jwt.secret=${JWT_SECRET:CHANGE_ME_a_very_long_random_signing_key_for_hs256_min_32_bytes_xxxxxxxx}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.security.jwt.issuer=bnr-compliance-portal

app.documents.storage-root=${DOC_STORAGE_ROOT:./var/documents}
app.documents.max-bytes=5242880

app.seed.enabled=${SEED_ENABLED:true}
app.seed.default-password=Password123!

# Browser origins allowed to open STOMP /ws (comma-separated patterns).
app.websocket.allowed-origin-patterns=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}

# REST CORS when the SPA hits the API from a distinct origin without a dev proxy.
app.security.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
