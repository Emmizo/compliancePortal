# Frontend nginx config. The React bundle is static; /api/* is reverse-proxied
# to the backend service over the internal docker network. Because the browser
# only ever sees one origin, no CORS headers are needed in production.

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Sensible default security headers; tune for your own deployment.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"   always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # Backend API. The 8 MB body limit covers a 5 MB document upload plus
    # multipart overhead and headers.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        client_max_body_size 8m;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # OpenAPI / Swagger UI passthroughs so http://<host>/swagger-ui.html and
    # http://<host>/v3/api-docs work via the same single host port as the app.
    location ~ ^/(v3/api-docs|swagger-ui|swagger-ui\.html|swagger-resources|webjars)(/|$) {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Long-cache hashed assets that Vite emits.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback so client-side routes survive a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
