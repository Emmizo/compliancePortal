# Docker Compose for the BNR Compliance Portal.
#
#   docker compose up --build      # first run / after code changes
#   docker compose up              # subsequent runs
#   docker compose down            # stop (keeps volumes -> data preserved)
#   docker compose down -v         # nuke everything (including the database)
#
# Service map:
#   db        MySQL 8.4 LTS, internal-only on the docker network
#   backend   Spring Boot fat-jar on :8080  (host port 8088 for direct API testing)
#   frontend  nginx serving the built SPA on :80, proxies /api and /ws to backend
#             Host URL: FRONTEND_HOST_PORT (default 3000) -> http://localhost:3000
#
#   Do not run `npm run dev` on 3000 at the same time as the frontend container maps 3000:80 unless you remap one of them (port bind conflict).
#   Hot reload + Docker API only: `docker compose up db backend` (omit `frontend`), then `npm run dev` in ./frontend.
#
# All secrets / tunables are read from a sibling .env file (or shell env).
# Copy .env.example -> .env and edit before running in any non-toy environment.

services:
  db:
    image: mysql:8.4
    container_name: compliance-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-compliance_portal}
      MYSQL_USER: ${MYSQL_USER:-portal}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-portal_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - portal_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: "jdbc:mysql://db:3306/${MYSQL_DATABASE:-compliance_portal}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8"
      DB_USERNAME: ${MYSQL_USER:-portal}
      DB_PASSWORD: ${MYSQL_PASSWORD:-portal_dev}

      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_replace_with_a_long_random_signing_key_for_HS256_min_32_bytes_xxxxxxxx}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}

      DOC_STORAGE_ROOT: /var/compliance/documents

      SEED_ENABLED: ${SEED_ENABLED:-true}

      # CORS: in production the frontend nginx and backend share an origin so
      # CORS is unused. We still allow the dev origin for engineers running
      # `npm run dev` against the dockerised backend.
      APP_SECURITY_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:3000,http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:3000}

      # JVM container tuning
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -Duser.timezone=UTC"
    ports:
      # Direct access to the backend for curl/postman. Comment out if you only
      # want the frontend reverse-proxy to expose it.
      - "8088:8080"
    volumes:
      - documents:/var/compliance/documents
    networks:
      - portal_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: compliance-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Same default host port as Vite (`npm run dev`) so Compose UI and dev server share one documented URL unless you remap.
      - "${FRONTEND_HOST_PORT:-3000}:80"
    networks:
      - portal_net

volumes:
  mysql_data:
    name: compliance_mysql_data
  documents:
    name: compliance_documents

networks:
  portal_net:
    driver: bridge
    name: compliance_portal_net
